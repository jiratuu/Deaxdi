<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accueil</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    h1 {
      margin-bottom: 30px;
    }

    .btn-container {
      display: flex;
      gap: 20px;
    }

    button {
      padding: 15px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #1f1f1f;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      background: #333;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <h1>Choisis ton site</h1>

  <div class="btn-container">
    <button onclick="goStream()">Streaming</button>
    <button onclick="goMovie()">Movies</button>
  </div>

  <script>
    function goStream() {
      window.location.href = "https://deaxdstream.onrender.com/";
    }

    function goMovie() {
      window.location.href = "https://deaxdmovie.onrender.com/";
    }
  </script>

</body>
</html>
